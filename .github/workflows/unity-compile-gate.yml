name: Unity Compile Gate

on:
  workflow_dispatch:
    inputs:
      target:
        description: Compile target project
        required: true
        default: both
        type: choice
        options:
          - builtin
          - urp
          - both
      editorPath:
        description: Optional Unity.exe path for the self-hosted runner
        required: false
        type: string
  pull_request:
    branches:
      - develop
      - main
    paths:
      - .github/workflows/unity-compile-gate.yml
      - scripts/compile-gate/**
      - Mu3Library_Base/**
      - Mu3Library_URP/**
      - UnityProject_BuiltIn/**
      - UnityProject_URP/**
  push:
    branches:
      - develop
      - main
    paths:
      - .github/workflows/unity-compile-gate.yml
      - scripts/compile-gate/**
      - Mu3Library_Base/**
      - Mu3Library_URP/**
      - UnityProject_BuiltIn/**
      - UnityProject_URP/**

permissions:
  contents: read

jobs:
  compile-gate:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on:
      - self-hosted
      - windows
      - unity
    env:
      COMPILE_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'both' }}
      UNITY_EDITOR_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.editorPath || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Unity compile gate
        shell: pwsh
        run: |
          $editorArgs = @()
          if (-not [string]::IsNullOrWhiteSpace($env:UNITY_EDITOR_PATH)) {
              $editorArgs = @('-EditorPath', $env:UNITY_EDITOR_PATH)
          }

          & .\scripts\compile-gate\run-unity-compile.ps1 -Target $env:COMPILE_TARGET @editorArgs

      - name: Upload compile artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-compile-gate-${{ github.run_id }}
          path: |
            tasks/compile-status.json
            log/compile-gate/
          if-no-files-found: ignore

  compile-gate-guidance:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report compile gate requirements
        shell: bash
        run: |
          echo "Unity compile automation in this repository requires a self-hosted Windows runner with the 'unity' label."
          echo "Use workflow_dispatch to run scripts/compile-gate/run-unity-compile.ps1 on that runner."